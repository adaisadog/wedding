<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮邀請</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --slate:#1C2A39;
    --slate-deep:#16222F;
    --pearl:#F8FAFC;
    --dove:#E2E8F0;
    --silver:#CFD2D6;
    --silver-line:rgba(207,210,214,.55);
    --silver-soft:rgba(207,210,214,.30);
    --forest:#1E4620;
    --forest-hover:#163417;
    --serif:'Playfair Display','Noto Serif TC', Georgia, serif;
    --serif-tc:'Noto Serif TC','Playfair Display', serif;
    --sans:'Noto Sans TC', system-ui, sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;scroll-padding-top:74px}
  body{font-family:var(--sans);color:var(--slate);background:var(--pearl);line-height:1.85;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%;height:auto}
  h1,h2,h3{font-family:var(--serif-tc);font-weight:500;letter-spacing:.08em}

  /* ---------- Art Deco 裝飾元件 ---------- */
  .eyebrow{
    font-family:var(--sans);font-size:.74rem;font-weight:500;letter-spacing:.5em;
    display:inline-block;padding-left:.5em;
  }
  .rule{display:flex;align-items:center;justify-content:center;gap:13px;margin:0 auto}
  .rule .line{height:1px;width:60px;background:linear-gradient(90deg,transparent,var(--silver))}
  .rule .line.r{background:linear-gradient(90deg,var(--silver),transparent)}
  .rule .gem{width:8px;height:8px;background:transparent;border:1px solid var(--silver);transform:rotate(45deg)}
  .rule .gem.fill{background:var(--silver)}
  .rule .gem.big{width:13px;height:13px;position:relative}
  .rule .gem.big::after{content:'';position:absolute;inset:2px;background:var(--silver)}

  section{padding:clamp(76px,9vw,132px) clamp(20px,6vw,80px);position:relative}

  /* ---------- 導覽列 ---------- */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:50;height:74px;
    display:flex;align-items:center;justify-content:center;gap:clamp(14px,3vw,40px);
    background:rgba(28,42,57,.93);backdrop-filter:blur(9px);
    border-bottom:1px solid var(--silver-soft);
  }
  nav::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--silver-soft);opacity:.4}
  nav a{
    color:var(--dove);text-decoration:none;font-size:.78rem;letter-spacing:.28em;
    padding:6px 2px;position:relative;transition:color .3s;white-space:nowrap;
  }
  nav a::after{content:'';position:absolute;left:50%;bottom:-2px;width:0;height:1px;background:var(--silver);transition:width .3s,left .3s}
  nav a:hover,nav a:focus-visible{color:var(--pearl);outline:none}
  nav a:hover::after,nav a:focus-visible::after{width:100%;left:0}
  .nav-monogram{font-family:var(--serif);color:var(--silver);font-size:1.05rem;letter-spacing:.3em;padding:0 8px;position:relative}
  .nav-monogram::before,.nav-monogram::after{content:'◆';font-size:.5rem;color:var(--silver);opacity:.7;vertical-align:middle;margin:0 5px}

  /* ---------- 1. 歡迎首頁 ---------- */
  #welcome{
    background:var(--slate);color:var(--pearl);min-height:100vh;
    display:flex;align-items:center;justify-content:center;text-align:center;
    padding-top:74px;overflow:hidden;position:relative;
  }
  #welcome::before{
    content:'';position:absolute;inset:0;opacity:.05;pointer-events:none;
    background-image:
      repeating-linear-gradient(45deg,var(--silver) 0 1px,transparent 1px 38px),
      repeating-linear-gradient(-45deg,var(--silver) 0 1px,transparent 1px 38px);
  }
  .hero-frame{
    position:relative;max-width:880px;width:100%;z-index:1;
    padding:clamp(56px,8vw,96px) clamp(28px,7vw,80px);
    border:1px solid var(--silver-line);
  }
  .hero-frame::before,.hero-frame::after{
    content:'';position:absolute;width:54px;height:54px;border:1px solid var(--silver);
  }
  .hero-frame::before{top:-9px;left:-9px;border-right:none;border-bottom:none}
  .hero-frame::after{bottom:-9px;right:-9px;border-left:none;border-top:none}
  .hero-inner{position:relative;padding:clamp(20px,3vw,34px)}
  .hero-inner::before,.hero-inner::after{
    content:'';position:absolute;width:40px;height:40px;border:1px solid var(--silver-line);
  }
  .hero-inner::before{top:0;right:0;border-left:none;border-bottom:none}
  .hero-inner::after{bottom:0;left:0;border-right:none;border-top:none}
  .hero-cnr{position:absolute;width:40px;height:40px;border:1px solid var(--silver-line);z-index:1}
  .hero-cnr.tl{top:0;left:0;border-right:none;border-bottom:none}
  .hero-cnr.br{bottom:0;right:0;border-left:none;border-top:none}
  .hero-diamond{margin:0 auto 34px;width:44px;color:var(--silver)}
  .hero-diamond svg{width:100%;height:auto;display:block}
  .hero-subline{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:34px}
  .hero-subline .l{height:1px;width:clamp(40px,9vw,90px);background:var(--silver-line)}
  #welcome .subtitle{
    font-family:var(--sans);font-size:clamp(.72rem,1.6vw,.86rem);
    color:var(--silver);font-weight:400;letter-spacing:.36em;white-space:nowrap;overflow-wrap:break-word;
  }
  #welcome h1{
    font-family:var(--serif);
    font-size:clamp(2.4rem,8vw,5.2rem);line-height:1.1;font-weight:500;
    color:var(--pearl);margin:0 0 30px;min-height:1.1em;overflow-wrap:break-word;
    letter-spacing:clamp(.06em,1.4vw,.22em);text-transform:uppercase;
  }
  #welcome .amp{font-family:var(--serif);font-weight:400;color:var(--silver);padding:0 .12em}
  .hero-flourish{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:42px}
  .hero-flourish .d{width:8px;height:8px;background:var(--silver);transform:rotate(45deg)}
  .hero-flourish .d.sm{width:4px;height:4px;background:var(--silver-line)}
  .hero-flourish .seg{height:1px;width:clamp(40px,8vw,80px);background:var(--silver-line);margin:0 6px}
  .hero-datebox{display:inline-block;border:1px solid var(--silver-line);position:relative;padding:18px clamp(34px,6vw,60px)}
  .hero-datebox::before{content:'';position:absolute;inset:4px;border:1px solid var(--silver-soft);pointer-events:none}
  .hero-date{
    font-family:var(--serif);font-size:clamp(1.3rem,3.4vw,2rem);color:var(--pearl);
    letter-spacing:.34em;padding-left:.34em;white-space:nowrap;position:relative;z-index:1;
  }
  .hero-scroll{
    position:absolute;left:50%;bottom:clamp(20px,4vw,42px);transform:translateX(-50%);
    text-align:center;z-index:1;color:var(--silver);text-decoration:none;transition:color .3s;
  }
  .hero-scroll:hover,.hero-scroll:focus-visible{color:var(--pearl);outline:none}
  .hero-scroll .txt{font-family:var(--sans);font-size:.66rem;letter-spacing:.42em;padding-left:.42em;display:block;margin-bottom:10px}
  .hero-scroll .arrow{display:inline-block;animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
  @media(prefers-reduced-motion:reduce){.hero-scroll .arrow{animation:none}}

  /* ---------- 1.5 全寬橫式首圖 ---------- */
  #banner{padding:0;background:var(--pearl)}
  .banner-wrap{position:relative;width:100%;aspect-ratio:21/9;min-height:340px;max-height:78vh;overflow:hidden;background:var(--slate)}
  .banner-wrap img{width:100%;height:100%;object-fit:cover;object-position:center;display:block}
  .banner-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(28,42,57,.18),rgba(28,42,57,0) 35%,rgba(28,42,57,.42));pointer-events:none;z-index:1}
  .banner-frame{position:absolute;inset:clamp(16px,2.5vw,34px);border:1px solid var(--silver-line);z-index:2;pointer-events:none}
  .banner-frame::before{content:'';position:absolute;inset:7px;border:1px solid rgba(248,250,252,.22)}
  .banner-cnr{position:absolute;width:34px;height:34px;border:1px solid var(--silver);z-index:3}
  .banner-cnr.tl{top:clamp(16px,2.5vw,34px);left:clamp(16px,2.5vw,34px);border-right:none;border-bottom:none}
  .banner-cnr.tr{top:clamp(16px,2.5vw,34px);right:clamp(16px,2.5vw,34px);border-left:none;border-bottom:none}
  .banner-cnr.bl{bottom:clamp(16px,2.5vw,34px);left:clamp(16px,2.5vw,34px);border-right:none;border-top:none}
  .banner-cnr.br{bottom:clamp(16px,2.5vw,34px);right:clamp(16px,2.5vw,34px);border-left:none;border-top:none}
  .banner-caption{position:absolute;left:0;right:0;bottom:clamp(40px,6vw,72px);text-align:center;z-index:4;padding:0 24px;color:var(--pearl)}
  .banner-caption .ct{font-family:var(--serif);font-size:clamp(1.1rem,3vw,1.9rem);letter-spacing:.22em;text-shadow:0 2px 18px rgba(0,0,0,.45);overflow-wrap:break-word}
  .banner-caption .cr{display:flex;align-items:center;justify-content:center;gap:11px;margin-top:14px}
  .banner-caption .cr .line{height:1px;width:46px;background:rgba(248,250,252,.6)}
  .banner-caption .cr .gem{width:7px;height:7px;border:1px solid var(--pearl);transform:rotate(45deg)}
  .banner-ph{position:absolute;inset:0;z-index:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--silver);background:var(--slate)}
  .banner-ph .pd{width:16px;height:16px;border:1px solid var(--silver);transform:rotate(45deg)}
  .banner-ph .pt{font-size:.86rem;letter-spacing:.08em;line-height:1.8;text-align:center;padding:0 24px}

  /* ---------- 區塊標題 ---------- */
  .sec-head{text-align:center;max-width:700px;margin:0 auto clamp(50px,6vw,76px)}
  .sec-head .eyebrow{color:var(--forest);margin-bottom:18px}
  .sec-head h2{font-size:clamp(2rem,4.6vw,3.1rem);color:var(--slate);margin-bottom:22px;overflow-wrap:break-word;letter-spacing:.14em}
  .sec-head p{color:#52606D;max-width:560px;margin:0 auto;overflow-wrap:break-word;letter-spacing:.04em}
  .sec-head .rule{margin-top:26px}

  /* ---------- 2. 婚禮時間與地點 ---------- */
  #details{background:var(--pearl)}
  .details-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:clamp(28px,5vw,72px);
    max-width:1180px;margin:0 auto;align-items:stretch;
  }
  .details-info{
    display:flex;flex-direction:column;justify-content:center;
    border:1px solid var(--silver);padding:clamp(34px,4vw,60px);position:relative;background:var(--pearl);
  }
  .details-info::before{content:'';position:absolute;inset:9px;border:1px solid var(--dove);pointer-events:none}
  .details-info::after{content:'';position:absolute;top:18px;left:18px;width:18px;height:18px;border-left:1px solid var(--forest);border-top:1px solid var(--forest)}
  .detail-row{position:relative;z-index:1;padding:22px 0;border-bottom:1px solid var(--dove);min-height:84px}
  .detail-row:last-child{border-bottom:none}
  .detail-row .label{
    font-size:.74rem;letter-spacing:.28em;color:var(--forest);
    display:flex;align-items:center;gap:11px;margin-bottom:9px;
  }
  .detail-row .label .dia{width:6px;height:6px;background:var(--forest);transform:rotate(45deg);flex:none}
  .detail-row .value{font-family:var(--serif-tc);font-size:clamp(1.15rem,2.2vw,1.5rem);color:var(--slate);overflow-wrap:break-word;letter-spacing:.05em}
  .detail-row .sub{font-size:.95rem;color:#52606D;margin-top:5px;overflow-wrap:break-word}
  .details-photo{position:relative;min-height:440px}
  .details-photo .frame{position:absolute;inset:0;border:1px solid var(--silver);z-index:2;pointer-events:none}
  .details-photo .frame::before{content:'';position:absolute;inset:10px;border:1px solid var(--silver-line)}
  .details-photo .frame .cnr{position:absolute;width:22px;height:22px;border:1px solid var(--silver);z-index:3}
  .details-photo .frame .cnr.tl{top:-1px;left:-1px;border-right:none;border-bottom:none}
  .details-photo .frame .cnr.br{bottom:-1px;right:-1px;border-left:none;border-top:none}
  .details-photo img{width:100%;height:100%;object-fit:cover;object-position:center;position:absolute;inset:0;padding:11px;background:var(--pearl)}
  .details-photo .ph{
    position:absolute;inset:11px;background:var(--dove);z-index:1;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    color:#7a8794;text-align:center;padding:20px;
  }
  .details-photo .ph .ph-dia{width:14px;height:14px;border:1px solid #94a3b8;transform:rotate(45deg)}
  .details-photo .ph .ph-txt{font-size:.82rem;letter-spacing:.06em;line-height:1.7}

  /* 交通指南 */
  .transport{max-width:1180px;margin:clamp(28px,4vw,48px) auto 0}
  .transport-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,3vw,40px)}
  .transport-card{
    border:1px solid var(--silver);background:var(--pearl);position:relative;
    padding:clamp(28px,3.5vw,44px);min-height:150px;
  }
  .transport-card::before{content:'';position:absolute;top:13px;left:13px;width:16px;height:16px;border-left:1px solid var(--forest);border-top:1px solid var(--forest)}
  .transport-card::after{content:'';position:absolute;bottom:13px;right:13px;width:16px;height:16px;border-right:1px solid var(--forest);border-bottom:1px solid var(--forest)}
  .transport-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .transport-icon{width:30px;height:30px;color:var(--forest);flex:none}
  .transport-icon svg{width:100%;height:100%}
  .transport-head .ttl{font-family:var(--serif-tc);font-size:1.25rem;color:var(--slate);letter-spacing:.08em}
  .transport-divider{width:38px;height:1px;background:var(--silver);margin-bottom:16px;position:relative}
  .transport-divider::before{content:'';position:absolute;left:0;top:50%;width:5px;height:5px;background:var(--silver);transform:translateY(-50%) rotate(45deg)}
  .transport-card p{color:#52606D;line-height:1.85;overflow-wrap:break-word;white-space:pre-line}

  /* ---------- 3. Dress Code ---------- */
  #dresscode{background:var(--dove);position:relative}
  #dresscode::before,#dresscode::after{content:'';position:absolute;width:90px;height:90px;border:1px solid var(--silver);opacity:.5;pointer-events:none}
  #dresscode::before{top:34px;left:34px;border-right:none;border-bottom:none}
  #dresscode::after{bottom:34px;right:34px;border-left:none;border-top:none}
  .dress-panels{
    display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,3vw,40px);
    max-width:1000px;margin:0 auto;align-items:stretch;
  }
  .dress-panel{
    background:var(--pearl);text-align:center;position:relative;
    border:1px solid var(--silver);padding:clamp(18px,2vw,24px);
    display:flex;flex-direction:column;align-items:center;
  }
  .dress-panel::before,.dress-panel::after{content:'';position:absolute;width:38px;height:38px;border:1px solid var(--forest);z-index:3}
  .dress-panel::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  .dress-panel::after{bottom:-1px;right:-1px;border-left:none;border-top:none}
  .dress-photo{position:relative;width:100%;aspect-ratio:4/5;margin-bottom:24px}
  .dress-photo .pframe{position:absolute;inset:0;border:1px solid var(--silver);z-index:2;pointer-events:none}
  .dress-photo .pframe::before,.dress-photo .pframe::after{content:'';position:absolute;width:24px;height:24px;border:1px solid var(--silver)}
  .dress-photo .pframe::before{top:7px;left:7px;border-right:none;border-bottom:none}
  .dress-photo .pframe::after{bottom:7px;right:7px;border-left:none;border-top:none}
  .dress-photo img{width:100%;height:100%;object-fit:cover;object-position:top center;padding:9px;background:var(--pearl)}
  .dress-body{padding:0 clamp(14px,2vw,26px) clamp(22px,2.5vw,32px)}
  .dress-panel .who{font-size:.72rem;letter-spacing:.4em;color:var(--forest);margin-bottom:12px;display:block}
  .dress-panel h3{font-size:clamp(1.4rem,2.6vw,1.9rem);color:var(--slate);margin-bottom:18px;overflow-wrap:break-word;letter-spacing:.1em}
  .dress-divider{width:42px;height:1px;background:var(--silver);margin:0 auto 18px;position:relative}
  .dress-divider::before{content:'';position:absolute;left:50%;top:50%;width:6px;height:6px;background:var(--silver);transform:translate(-50%,-50%) rotate(45deg)}
  .dress-panel .guide{color:#52606D;line-height:1.85;overflow-wrap:break-word;min-height:3.6em}

  /* ---------- 4. 回覆邀請 RSVP ---------- */
  #rsvp{background:var(--slate);color:var(--pearl);position:relative;overflow:hidden}
  #rsvp::before{
    content:'';position:absolute;inset:0;opacity:.045;pointer-events:none;
    background-image:repeating-linear-gradient(90deg,var(--silver) 0 1px,transparent 1px 48px);
  }
  #rsvp .sec-head{position:relative;z-index:1}
  #rsvp .sec-head .eyebrow{color:var(--silver)}
  #rsvp .sec-head h2{color:var(--pearl)}
  #rsvp .sec-head p{color:var(--dove)}
  #rsvp .sec-head .rule .line{background:linear-gradient(90deg,transparent,var(--silver-line))}
  #rsvp .sec-head .rule .line.r{background:linear-gradient(90deg,var(--silver-line),transparent)}
  .rsvp-card{
    max-width:560px;margin:0 auto;position:relative;z-index:1;background:var(--slate-deep);
    border:1px solid var(--silver-line);padding:clamp(44px,6vw,72px) clamp(30px,5vw,60px);text-align:center;
  }
  .rsvp-card::before,.rsvp-card::after{content:'';position:absolute;width:44px;height:44px;border:1px solid var(--silver)}
  .rsvp-card::before{top:-9px;left:-9px;border-right:none;border-bottom:none}
  .rsvp-card::after{bottom:-9px;right:-9px;border-left:none;border-top:none}
  .rsvp-inner-cnr{position:absolute;width:20px;height:20px;border:1px solid var(--silver-line)}
  .rsvp-inner-cnr.tr{top:14px;right:14px;border-left:none;border-bottom:none}
  .rsvp-inner-cnr.bl{bottom:14px;left:14px;border-right:none;border-top:none}
  .rsvp-deco{width:46px;margin:0 auto 26px;color:var(--silver)}
  .rsvp-card .heading{font-family:var(--serif-tc);font-size:clamp(1.4rem,3vw,2rem);color:var(--pearl);margin-bottom:16px;letter-spacing:.1em}
  .rsvp-card .body{color:var(--dove);line-height:1.9;margin-bottom:14px;overflow-wrap:break-word}
  .rsvp-card .deadline{font-family:var(--serif);font-style:italic;color:var(--silver);font-size:1.05rem;margin-bottom:34px;letter-spacing:.04em;min-height:1px}
  .rsvp-btn{
    display:inline-flex;align-items:center;justify-content:center;gap:12px;
    background:var(--forest);color:var(--pearl);text-decoration:none;cursor:pointer;
    font-family:var(--sans);font-size:.82rem;letter-spacing:.3em;
    padding:18px 44px;border:1px solid var(--forest);position:relative;transition:background .3s,letter-spacing .3s;
  }
  .rsvp-btn::before,.rsvp-btn::after{content:'';position:absolute;width:9px;height:9px;border:1px solid rgba(248,250,252,.5);transition:border-color .3s}
  .rsvp-btn::before{top:5px;left:5px;border-right:none;border-bottom:none}
  .rsvp-btn::after{bottom:5px;right:5px;border-left:none;border-top:none}
  .rsvp-btn:hover,.rsvp-btn:focus-visible{background:var(--forest-hover);letter-spacing:.34em;outline:none}
  .rsvp-btn:focus-visible{box-shadow:0 0 0 2px var(--slate-deep),0 0 0 3px var(--silver)}
  .rsvp-btn .gem{width:7px;height:7px;background:var(--silver);transform:rotate(45deg);flex:none}

  /* ---------- 5. 五兄弟介紹 ---------- */
  #brothers{background:var(--pearl)}
  .brothers-grid{
    display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(14px,1.6vw,24px);
    max-width:1240px;margin:0 auto;
  }
  .bro-card{
    border:1px solid var(--silver);padding:28px 18px;text-align:center;background:var(--pearl);
    position:relative;display:flex;flex-direction:column;align-items:center;min-height:350px;transition:transform .35s,box-shadow .35s;
  }
  .bro-card::before{content:'';position:absolute;inset:7px;border:1px solid var(--dove);pointer-events:none}
  .bro-card::after{content:'';position:absolute;top:13px;left:13px;width:14px;height:14px;border-left:1px solid var(--forest);border-top:1px solid var(--forest);opacity:0;transition:opacity .35s}
  .bro-card:hover{transform:translateY(-6px);box-shadow:0 16px 36px rgba(28,42,57,.12)}
  .bro-card:hover::after{opacity:1}
  .bro-avatar{position:relative;width:98px;height:98px;margin:0 auto 20px;z-index:1}

const $ = id => document.getElementById(id);
const setText = (id, val, fallback="") => { const el=$(id); if(el) el.textContent = (val ?? "").toString().trim() || fallback; };
function escapeHtml(s){ return (s??"").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
function setImg(id, url){ const img=$(id); if(!img) return; if(url){ img.src=url; img.style.display=""; } else { img.removeAttribute("src"); img.style.display="none"; } }

  if(bannerPh) bannerPh.style.display = banner.imageUrl ? "none" : "flex";
  setText("bannerCaption", banner.caption);

  // 2. 婚禮時間與地點
  setText("detailsEyebrow", config.details.eyebrow);
  setText("detailsTitle", config.details.title, "時間與地點");
  setImg("detailsImage", config.details.imageUrl);
  const detailsPh = $("detailsPh");
  if(detailsPh) detailsPh.style.display = config.details.imageUrl ? "none" : "flex";
  const rowsWrap = $("detailRows"); rowsWrap.innerHTML = "";
  (config.details.rows || []).forEach(r => {
    const div = document.createElement("div");
    div.className = "detail-row";
    div.innerHTML = `
      <div class="label"><span class="dia"></span>${escapeHtml(r.label||"")}</div>
      <div class="value">${escapeHtml(r.value||"—")}</div>
      ${r.sub ? `<div class="sub">${escapeHtml(r.sub)}</div>`:""}`;
    rowsWrap.appendChild(div);
  });
  // 交通指南
  const tp = (config.details && config.details.transport) || {};
  setText("metroTitle", tp.metroTitle, "大眾運輸");
  setText("metroText", tp.metroText);
  setText("parkingTitle", tp.parkingTitle, "開車與停車");
  setText("parkingText", tp.parkingText);
  const transportWrap = $("transport");
  if(transportWrap){
    const hasTransport = (tp.metroText && tp.metroText.trim()) || (tp.parkingText && tp.parkingText.trim());
    transportWrap.style.display = hasTransport ? "block" : "none";
  }

  // 3. 著裝守則
  setText("dressEyebrow", config.dressCode.eyebrow);
  setText("dressTitle", config.dressCode.title, "著裝守則");
  setText("dressNote", config.dressCode.note);
  const men = config.dressCode.men || {}, women = config.dressCode.women || {};
  setImg("dressMenImage", men.imageUrl);
  setImg("dressWomenImage", women.imageUrl);
  setText("dressMenWho", men.who, "紳士");
  setText("dressMenTitle", men.title, "—");
  setText("dressMenGuide", men.guide);
  setText("dressWomenWho", women.who, "淑女");
  setText("dressWomenTitle", women.title, "—");
  setText("dressWomenGuide", women.guide);

  // 4. 回覆邀請(連結按鈕)
  const rsvp = config.rsvp || {};
  setText("rsvpEyebrow", rsvp.eyebrow);
  setText("rsvpTitle", rsvp.title, "回覆邀請");
  setText("rsvpHeading", rsvp.heading);
  setText("rsvpBody", rsvp.body);
  setText("rsvpDeadline", rsvp.deadline);
  setText("rsvpBtnText", rsvp.buttonText, "前往填寫");
  const btn = $("rsvpBtn");
  if(rsvp.buttonUrl){ btn.href = rsvp.buttonUrl; btn.style.display = ""; }
  else { btn.removeAttribute("href"); }

  // 5. 五兄弟介紹
  setText("brosEyebrow", config.brothers.eyebrow);
  setText("brosTitle", config.brothers.title, "兄弟們");
  setText("brosIntro", config.brothers.intro);
  const grid = $("brothersGrid"); grid.innerHTML = "";
  (config.brothers.members || []).forEach(m => {
    const card = document.createElement("div");
    card.className = "bro-card";
    const avatar = m.avatar
      ? `<img src="${escapeAttr(m.avatar)}" alt="${escapeAttr(m.name||'')}">`
      : `<div class="ph"></div>`;
    card.innerHTML = `
      <div class="bro-avatar">${avatar}</div>
      <div class="bro-name">${escapeHtml(m.name||"—")}</div>
      <div class="bro-role">${escapeHtml(m.role||"")}</div>
      <div class="bro-divider"></div>
      <div class="bro-bio">${escapeHtml(m.bio||"")}</div>`;
    grid.appendChild(card);
  });

  // 6. 精選相簿
  setText("albumEyebrow", config.album.eyebrow);
  setText("albumTitle", config.album.title, "精選相簿");
  setText("albumIntro", config.album.intro);
  const am = $("albumGrid"); am.innerHTML = "";
  (config.album.images || []).forEach((url,i) => {
    if(!url) return;
    const fig = document.createElement("figure");
    fig.innerHTML = `<img src="${escapeAttr(url)}" alt="相簿照片 ${i+1}" loading="lazy">`;
    am.appendChild(fig);
  });
}

render();

/* 導覽列與首頁捲動引導的平滑滾動(含頂部高度補償) */
document.querySelectorAll('nav a[href^="#"], .hero-scroll[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const target = document.querySelector(a.getAttribute('href'));
    if(target){
      e.preventDefault();
      const top = target.getBoundingClientRect().top + window.pageYOffset - 74;
      window.scrollTo({ top, behavior: matchMedia('(prefers-reduced-motion: reduce)').matches ? 'auto' : 'smooth' });
    }
  });
});
</script>
</body>
</html>
